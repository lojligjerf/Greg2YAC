<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YAC Calendar Converter</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            font-size: 15px;
            line-height: 1.4;
            color: #222;
            background: #fafafa;
            padding: 16px;
            max-width: 540px;
            margin: 0 auto;
            -webkit-text-size-adjust: 100%;
        }
        h1 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 14px;
            text-align: center;
            letter-spacing: 0.02em;
            color: #333;
        }
        .converter-block {
            background: #fff;
            border: 1px solid #ddd;
            padding: 14px 16px;
            margin-bottom: 12px;
        }
        .converter-block h2 {
            font-size: 0.95em;
            font-weight: 600;
            margin-bottom: 10px;
            color: #444;
            letter-spacing: 0.02em;
        }
        .field-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            align-items: center;
            margin-bottom: 8px;
        }
        .field-row+.field-row {
            margin-top: 2px;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            min-width: 0;
            flex: 1 1 60px;
        }
        .field-group label {
            font-size: 0.75em;
            font-weight: 500;
            color: #666;
            margin-bottom: 2px;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .field-group input,
        .field-group select {
            font-size: 0.95em;
            padding: 6px 7px;
            border: 1px solid #ccc;
            background: #fdfdfd;
            width: 100%;
            min-width: 50px;
            border-radius: 0;
        }
        .field-group input:focus,
        .field-group select:focus {
            outline: 1px solid #888;
            outline-offset: -1px;
            background: #fff;
        }
        .field-group input:disabled,
        .field-group select:disabled {
            background: #eee;
            color: #999;
            cursor: not-allowed;
        }
        .field-group input[readonly] {
            background: #f5f5f5;
            color: #555;
            cursor: default;
            border-color: #ddd;
        }
        .field-group input[readonly]:focus {
            outline: none;
        }
        .note {
            font-size: 0.7em;
            color: #888;
            margin-top: 4px;
            letter-spacing: 0.02em;
        }
        .intercalary-badge {
            font-size: 0.7em;
            font-weight: 600;
            color: #b45f06;
            background: #fef3e0;
            padding: 2px 6px;
            display: inline-block;
            margin-left: 4px;
            letter-spacing: 0.03em;
        }
        .name-row {
            border-top: 1px solid #eee;
            padding-top: 8px;
            margin-top: 2px;
        }
        .name-row .field-group label {
            color: #999;
            font-size: 0.65em;
        }
        .name-row .field-group input {
            font-size: 0.85em;
            font-weight: 500;
            color: #333;
            background: #f7f7f7;
            border-color: #e0e0e0;
            padding: 5px 7px;
        }
        .name-row .field-group input[readonly] {
            background: #f7f7f7;
            color: #333;
        }
        .epoch-row .field-group label {
            color: #777;
            font-size: 0.65em;
        }
        .epoch-row .field-group input {
            font-size: 0.85em;
            font-weight: 500;
            color: #2a5c8a;
            background: #f0f5fa;
            border-color: #c0d0e0;
            padding: 5px 7px;
        }
        .epoch-row .field-group input[readonly] {
            background: #f0f5fa;
            color: #2a5c8a;
        }
        .fullname-row {
            border-top: 1px solid #e8e8e8;
            padding-top: 6px;
            margin-top: 4px;
        }
        .fullname-row .field-group {
            flex: 1 1 100%;
        }
        .fullname-row .field-group input {
            font-size: 0.95em;
            font-weight: 500;
            color: #1a4a6e;
            background: #f7fafc;
            border-color: #c8d8e8;
            padding: 6px 10px;
            text-align: center;
        }
        .fullname-row .field-group input[readonly] {
            background: #f7fafc;
            color: #1a4a6e;
        }
        @media (max-width: 400px) {
            body {
                padding: 8px;
                font-size: 14px;
            }
            .converter-block {
                padding: 10px 12px;
            }
            .field-group {
                flex: 1 1 45px;
            }
        }
    </style>
</head>
<body>
    <h1>YAC Calendar Converter</h1>

    <!-- GREGORIAN -->
    <div class="converter-block" id="gregorian-block">
        <h2>Proleptic Gregorian</h2>
        <div class="field-row">
            <div class="field-group">
                <label for="greg-year">Year</label>
                <input type="number" id="greg-year" placeholder="e.g. -662" />
            </div>
            <div class="field-group">
                <label for="greg-month">Month</label>
                <select id="greg-month">
                    <option value="1">Jan</option><option value="2">Feb</option><option value="3">Mar</option>
                    <option value="4">Apr</option><option value="5">May</option><option value="6">Jun</option>
                    <option value="7">Jul</option><option value="8">Aug</option><option value="9">Sep</option>
                    <option value="10">Oct</option><option value="11">Nov</option><option value="12">Dec</option>
                </select>
            </div>
            <div class="field-group">
                <label for="greg-day">Day</label>
                <input type="number" id="greg-day" min="1" max="31" />
            </div>
        </div>
        <div class="note">Use astronomical year: 0 = 1 BCE, −1 = 2 BCE, etc.</div>
    </div>

    <!-- YAC -->
    <div class="converter-block" id="yac-block">
        <h2>YAC Calendar <span style="font-weight:400;font-size:0.8em;">(6×6×10+6−3/4−3/384)</span></h2>

        <!-- input row -->
        <div class="field-row">
            <div class="field-group">
                <label for="yac-year">Year</label>
                <input type="number" id="yac-year" placeholder="YAC year" />
            </div>
            <div class="field-group">
                <label for="yac-month">Month</label>
                <select id="yac-month">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">Intercalary</option>
                </select>
            </div>
            <div class="field-group" id="yac-week-group">
                <label for="yac-week">Week</label>
                <input type="number" id="yac-week" min="1" max="6" />
            </div>
            <div class="field-group">
                <label for="yac-day">Day</label>
                <input type="number" id="yac-day" min="1" max="6" />
            </div>
        </div>

        <!-- epoch & year-in-epoch row -->
        <div class="field-row epoch-row">
            <div class="field-group">
                <label>Epoch</label>
                <input type="text" id="yac-epoch" readonly value="—" />
            </div>
            <div class="field-group">
                <label>Year in Epoch</label>
                <input type="text" id="yac-year-in-epoch" readonly value="—" />
            </div>
        </div>

        <!-- display-name row (month, week, day names) -->
        <div class="field-row name-row">
            <div class="field-group">
                <label>Month Name</label>
                <input type="text" id="yac-month-name" readonly value="—" />
            </div>
            <div class="field-group">
                <label>Week Name</label>
                <input type="text" id="yac-week-name" readonly value="—" />
            </div>
            <div class="field-group">
                <label>Day Name</label>
                <input type="text" id="yac-day-name" readonly value="—" />
            </div>
        </div>

        <!-- full name row -->
        <div class="field-row fullname-row">
            <div class="field-group">
                <label>Full Date</label>
                <input type="text" id="yac-full-name" readonly value="—" />
            </div>
        </div>

        <div class="note" id="yac-intercalary-note" style="display:none;">
            <span class="intercalary-badge">Intercalary</span> Days outside regular months &amp; weeks.
        </div>
        <div class="note" id="yac-zeroint-note" style="display:none;color:#c44;">
            This year has 0 intercalary days (divisible by 384).
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            // ─── N A M E   A R R A Y S  ──────────────────────────────────────
            var monthNames = [
                'Month 1',
                'Month 2',
                'Month 3',
                'Month 4',
                'Month 5',
                'Month 6',
                'Month 7',
                'Month 8',
                'Month 9',
                'Month 10',
                'Intercalary'
            ];

            var weekNames = [
                'Week 1',
                'Week 2',
                'Week 3',
                'Week 4',
                'Week 5',
                'Week 6'
            ];

            var dayNames = [
                'Day 1',
                'Day 2',
                'Day 3',
                'Day 4',
                'Day 5',
                'Day 6'
            ];

            // ─── O R D I N A L   S U F F I X  ──────────────────────────────
            function ordinalSuffix(n) {
                const rules = new Intl.PluralRules('en', { type: 'ordinal' });
                const suffix = {
                    'one': 'st',
                    'two': 'nd',
                    'few': 'rd',
                    'other': 'th'
                };
                return suffix[rules.select(n)] || 'th';
            }

            // ─── C O R E   C A L E N D A R   F U N C T I O N S  ────────────

            var EPOCH_JDN;

            function isGregLeapYear(y) {
                return (y % 4 === 0 && (y % 100 !== 0 || y % 400 === 0));
            }

            function daysInGregMonth(y, m) {
                var days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];
                if (m === 2 && isGregLeapYear(y)) return 29;
                return days[m - 1];
            }

            function computeJDN(y, m, d) {
                var a = Math.floor((14 - m) / 12);
                var Y = y + 4800 - a;
                var M = m + 12 * a - 3;
                return d + Math.floor((153 * M + 2) / 5) + 365 * Y +
                    Math.floor(Y / 4) - Math.floor(Y / 100) + Math.floor(Y / 400) - 32045;
            }

            function jdnToGregorian(jdn) {
                var L = jdn + 68569;
                var N = Math.floor((4 * L) / 146097);
                L = L - Math.floor((146097 * N + 3) / 4);
                var Y = Math.floor((4000 * (L + 1)) / 1461001);
                L = L - Math.floor((1461 * Y) / 4) + 31;
                var M = Math.floor((80 * L) / 2447);
                var d = L - Math.floor((2447 * M) / 80);
                L = Math.floor(M / 11);
                M = M + 2 - 12 * L;
                Y = 100 * (N - 49) + Y + L;
                return { year: Y, month: M, day: d };
            }

            EPOCH_JDN = computeJDN(-662, 12, 20);

            function gregorianToDays(y, m, d) {
                return computeJDN(y, m, d) - EPOCH_JDN;
            }

            function daysToGregorian(days) {
                return jdnToGregorian(EPOCH_JDN + days);
            }

            // ─── Y A C   H E L P E R S  ──────────────────────────────────────

            function daysInYacYear(y) {
                var intercalary = 6;
                if (y % 4 === 0) intercalary -= 3;
                if (y % 384 === 0) intercalary -= 3;
                return 360 + intercalary;
            }

            function intercalaryDaysInYacYear(y) {
                return daysInYacYear(y) - 360;
            }

            function yacToDays(y, m, w, d) {
                var dayOffset, total = 0,
                    i;
                if (m >= 1 && m <= 10) {
                    var ww = Math.max(1, Math.min(6, w || 1));
                    var dd = Math.max(1, Math.min(6, d || 1));
                    dayOffset = (m - 1) * 36 + (ww - 1) * 6 + (dd - 1);
                } else {
                    var dd = Math.max(1, d || 1);
                    dayOffset = 360 + (dd - 1);
                }
                if (y >= 0) {
                    for (i = 0; i < y; i++) total += daysInYacYear(i);
                    total += dayOffset;
                } else {
                    for (i = y; i < 0; i++) total -= daysInYacYear(i);
                    total += dayOffset;
                }
                return total;
            }

            function daysToYac(days) {
                var y = 0,
                    remaining = days,
                    diy,
                    regularDays = 360,
                    intercalaryCount;
                if (remaining >= 0) {
                    while (remaining >= daysInYacYear(y)) {
                        remaining -= daysInYacYear(y);
                        y++;
                    }
                } else {
                    while (remaining < 0) {
                        y--;
                        remaining += daysInYacYear(y);
                    }
                }
                diy = daysInYacYear(y);
                intercalaryCount = diy - 360;
                if (remaining < regularDays) {
                    var month = Math.floor(remaining / 36) + 1;
                    var dayInMonth = remaining % 36;
                    var week = Math.floor(dayInMonth / 6) + 1;
                    var day = (dayInMonth % 6) + 1;
                    return {
                        year: y,
                        month: month,
                        week: week,
                        day: day,
                        isIntercalary: false,
                        intercalaryCount: intercalaryCount
                    };
                } else {
                    var intercalaryDay = remaining - regularDays + 1;
                    return {
                        year: y,
                        month: 11,
                        week: 0,
                        day: intercalaryDay,
                        isIntercalary: true,
                        intercalaryCount: intercalaryCount
                    };
                }
            }

            // ─── E P O C H   &   R E M A I N D E R  (fixed) ──────────────

            function getEpochInfo(year) {
                // epoch = floor(year / 384) + 1  (as before)
                var epoch = Math.floor(year / 384) + 1;
                // year_in_epoch = ((year % 384) + 384) % 384 + 1  (1-indexed remainder)
                var rem = ((year % 384) + 384) % 384;
                var yearInEpoch = rem + 1; // always 1..384
                return { epoch: epoch, yearInEpoch: yearInEpoch };
            }

            // ─── D O M   R E F S  ──────────────────────────────────────────

            var gregYear = document.getElementById('greg-year');
            var gregMonth = document.getElementById('greg-month');
            var gregDay = document.getElementById('greg-day');

            var yacYear = document.getElementById('yac-year');
            var yacMonth = document.getElementById('yac-month');
            var yacWeek = document.getElementById('yac-week');
            var yacDay = document.getElementById('yac-day');
            var yacWeekGroup = document.getElementById('yac-week-group');

            var yacMonthName = document.getElementById('yac-month-name');
            var yacWeekName = document.getElementById('yac-week-name');
            var yacDayName = document.getElementById('yac-day-name');
            var yacFullName = document.getElementById('yac-full-name');
            var yacEpoch = document.getElementById('yac-epoch');
            var yacYearInEpoch = document.getElementById('yac-year-in-epoch');

            var yacIntercalaryNote = document.getElementById('yac-intercalary-note');
            var yacZeroIntNote = document.getElementById('yac-zeroint-note');

            var updating = false;

            // ─── U I   H E L P E R S  ──────────────────────────────────────

            function updateYacMonthUI() {
                var m = parseInt(yacMonth.value, 10);
                var y = parseInt(yacYear.value, 10) || 0;
                var intCount = intercalaryDaysInYacYear(y);

                if (m === 11) {
                    yacWeekGroup.style.display = 'none';
                    yacWeek.disabled = true;
                    yacIntercalaryNote.style.display = '';
                    yacDay.max = Math.max(1, intCount);
                    yacDay.min = 1;
                    if (intCount === 0) {
                        yacZeroIntNote.style.display = '';
                        yacDay.disabled = true;
                        yacDay.value = 1;
                    } else {
                        yacZeroIntNote.style.display = 'none';
                        yacDay.disabled = false;
                        if (parseInt(yacDay.value, 10) > intCount) yacDay.value = intCount;
                    }
                } else {
                    yacWeekGroup.style.display = '';
                    yacWeek.disabled = false;
                    yacIntercalaryNote.style.display = 'none';
                    yacZeroIntNote.style.display = 'none';
                    yacDay.max = 6;
                    yacDay.min = 1;
                    yacDay.disabled = false;
                    yacWeek.max = 6;
                    yacWeek.min = 1;
                }

                var opt11 = yacMonth.querySelector('option[value="11"]');
                if (opt11) {
                    opt11.disabled = (intCount === 0);
                    if (intCount === 0 && m === 11) {
                        yacMonth.value = '10';
                        updateYacMonthUI();
                    }
                }

                // Update all derived fields
                updateYacDerivedFields();
            }

            function updateYacDerivedFields() {
                var y = parseInt(yacYear.value, 10);
                if (isNaN(y)) {
                    yacEpoch.value = '—';
                    yacYearInEpoch.value = '—';
                    yacMonthName.value = '—';
                    yacWeekName.value = '—';
                    yacDayName.value = '—';
                    yacFullName.value = '—';
                    return;
                }

                var m = parseInt(yacMonth.value, 10);
                var w = parseInt(yacWeek.value, 10) || 1;
                var d = parseInt(yacDay.value, 10) || 1;
                var intCount = intercalaryDaysInYacYear(y);

                // --- Epoch & year-in-epoch (fixed) ---
                var info = getEpochInfo(y);
                yacEpoch.value = info.epoch + ordinalSuffix(info.epoch);
                yacYearInEpoch.value = info.yearInEpoch;

                // --- Names ---
                // Month name
                if (m >= 1 && m <= 11) {
                    yacMonthName.value = monthNames[m - 1] || '?';
                } else {
                    yacMonthName.value = '—';
                }

                // Week & Day names
                if (m === 11) {
                    yacWeekName.value = '—';
                    if (intCount > 0 && d >= 1 && d <= intCount) {
                        yacDayName.value = 'Day ' + d;
                    } else {
                        yacDayName.value = '—';
                    }
                } else {
                    if (w >= 1 && w <= 6) {
                        yacWeekName.value = weekNames[w - 1] || '?';
                    } else {
                        yacWeekName.value = '—';
                    }
                    if (d >= 1 && d <= 6) {
                        yacDayName.value = dayNames[d - 1] || '?';
                    } else {
                        yacDayName.value = '—';
                    }
                }

                // --- Full name ---
                var dayName = yacDayName.value;
                var weekName = yacWeekName.value;
                var monthName = yacMonthName.value;
                var yearStr = y;

                if (m === 11) {
                    yacFullName.value = dayName + ' of ' + monthName + ', Year ' + yearStr;
                } else {
                    yacFullName.value = dayName + ' of ' + weekName + ', ' + monthName + ' of Year ' + yearStr;
                }
            }

            function setGregorianFields(y, m, d) {
                gregYear.value = y;
                gregMonth.value = m;
                gregDay.value = d;
                gregDay.max = daysInGregMonth(y, m);
                if (parseInt(gregDay.value, 10) > gregDay.max) gregDay.value = gregDay.max;
                if (parseInt(gregDay.value, 10) < 1) gregDay.value = 1;
            }

            function setYacFields(result) {
                yacYear.value = result.year;
                if (result.isIntercalary) {
                    yacMonth.value = '11';
                    yacWeek.value = 1;
                    yacDay.value = result.day;
                } else {
                    yacMonth.value = result.month;
                    yacWeek.value = result.week;
                    yacDay.value = result.day;
                }
                updateYacMonthUI();
            }

            function getGregorianInput() {
                var y = parseInt(gregYear.value, 10);
                var m = parseInt(gregMonth.value, 10);
                var d = parseInt(gregDay.value, 10);
                if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
                if (m < 1 || m > 12) return null;
                var maxD = daysInGregMonth(y, m);
                if (d < 1 || d > maxD) return null;
                return { year: y, month: m, day: d };
            }

            function getYacInput() {
                var y = parseInt(yacYear.value, 10);
                var m = parseInt(yacMonth.value, 10);
                var w = parseInt(yacWeek.value, 10) || 1;
                var d = parseInt(yacDay.value, 10);
                if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
                if (m < 1 || m > 11) return null;
                if (m === 11) {
                    var intCount = intercalaryDaysInYacYear(y);
                    if (intCount === 0) return null;
                    if (d < 1 || d > intCount) return null;
                    return { year: y, month: m, week: 0, day: d };
                } else {
                    if (m < 1 || m > 10) return null;
                    if (w < 1 || w > 6) return null;
                    if (d < 1 || d > 6) return null;
                    return { year: y, month: m, week: w, day: d };
                }
            }

            // ─── C O N V E R S I O N   F U N C T I O N S  ──────────────────

            function convertGregorianToYac() {
                if (updating) return;
                var g = getGregorianInput();
                if (!g) return;
                var days = gregorianToDays(g.year, g.month, g.day);
                var yacResult = daysToYac(days);
                updating = true;
                setYacFields(yacResult);
                updating = false;
            }

            function convertYacToGregorian() {
                if (updating) return;
                var y = getYacInput();
                if (!y) return;
                var days = yacToDays(y.year, y.month, y.week, y.day);
                var g = daysToGregorian(days);
                updating = true;
                setGregorianFields(g.year, g.month, g.day);
                updating = false;
            }

            function handleGregorianChange() {
                var y = parseInt(gregYear.value, 10);
                var m = parseInt(gregMonth.value, 10);
                if (!isNaN(y) && !isNaN(m)) {
                    gregDay.max = daysInGregMonth(y, m);
                    if (parseInt(gregDay.value, 10) > gregDay.max) gregDay.value = gregDay.max;
                }
                convertGregorianToYac();
            }

            function handleYacChange() {
                updateYacMonthUI();
                convertYacToGregorian();
            }

            // ─── A T T A C H   L I S T E N E R S  ──────────────────────────

            gregYear.addEventListener('input', handleGregorianChange);
            gregMonth.addEventListener('change', handleGregorianChange);
            gregDay.addEventListener('input', handleGregorianChange);

            yacYear.addEventListener('input', function() {
                updateYacMonthUI();
                convertYacToGregorian();
            });
            yacMonth.addEventListener('change', function() {
                updateYacMonthUI();
                convertYacToGregorian();
            });
            yacWeek.addEventListener('input', function() {
                updateYacDerivedFields();
                convertYacToGregorian();
            });
            yacDay.addEventListener('input', function() {
                updateYacDerivedFields();
                convertYacToGregorian();
            });

            // ─── I N I T I A L I Z E  ──────────────────────────────────────

            (function initialize() {
                updating = true;
                var now = new Date();
                setGregorianFields(now.getFullYear(), now.getMonth() + 1, now.getDate());
                var g = getGregorianInput();
                if (g) {
                    var days = gregorianToDays(g.year, g.month, g.day);
                    var yacResult = daysToYac(days);
                    setYacFields(yacResult);
                }
                updating = false;
            })();

        });
    </script>
</body>
</html>
